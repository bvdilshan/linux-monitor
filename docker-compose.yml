services:

  linux-monitor:
    build: .
    container_name: linux-monitor
    ports:
      - "8000:8000"
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always